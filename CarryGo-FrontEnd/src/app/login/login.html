<div class="auth-container">
  <div class="logo">
    <img src="./assets/images/carrygo-logo.png" alt="CarryGo Logo" />

    <p class="tagline">Deliver Anything, Anytime</p>
  </div>

  <h2>Login to CarryGo</h2>
  <p class="welcome">Welcome back! Please login to continue.</p>

  <!-- Tabs -->
  <div class="tabs">
    <button [class.active]="loginData.role === 'user'" (click)="loginData.role='user'">User Login</button>
    <button [class.active]="loginData.role === 'commuter'" (click)="loginData.role='commuter'">Commuter Login</button>
  </div>

  <form (ngSubmit)="onSubmit()" #loginForm="ngForm">

    <div class="form-group">
      <label for="email">Email</label>
      <input id="email" [(ngModel)]="loginData.email" name="email" placeholder="Enter your email or phone"
             required #email="ngModel" />
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <div class="password-wrapper">
        <input id="password" [(ngModel)]="loginData.password" name="password"
               [type]="showPassword ? 'text' : 'password'" placeholder="Enter your password"
               required #password="ngModel" />
        <button type="button" class="pwd-toggle" (click)="showPassword = !showPassword" tabindex="-1">
          <svg *ngIf="showPassword" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
          </svg>
          <svg *ngIf="!showPassword" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>
          </svg>
        </button>
      </div>
    </div>

    <a class="forgot-link" href="#">Forgot Password?</a>

    <button type="submit" class="btn-primary" [disabled]="loginForm.invalid || isLoading">
      {{ isLoading ? 'Logging in...' : 'Login as ' + (loginData.role | titlecase) }}
    </button>
  </form>

  <!-- ✅ Blue hyperlink to Register -->
  <p class="switch-link">
    Don’t have an account? <a routerLink="/register" class="register-link">Register here</a>
  </p>

  <footer>© 2026 CarryGo. All rights reserved.</footer>
</div>
